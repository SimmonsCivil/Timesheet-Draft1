<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCC Timesheet</title>
<style>
:root{--navy:#2D3691;--accent:#29ACE4;--light:#D6EEF9;--text:#444444;--subtle:#595959;--border:#CCCCCC;--stripe:#F2F2F2;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;font-size:14px;color:var(--text);background:#f0f2f8;min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:24px 16px 60px;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:3px solid var(--accent);margin-bottom:24px;}
.hdr img{height:50px;}
.hdr-r{text-align:right;}
.hdr-r h1{font-size:20px;color:var(--navy);}
.hdr-r p{font-size:11px;color:var(--subtle);margin-top:2px;}
.card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:18px 20px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:bold;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--light);}
.entry{background:#fff;border:1px solid var(--border);border-radius:6px;padding:16px 18px 12px;margin-bottom:10px;}
.entry.stripe{background:var(--stripe);}
.entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.entry-num{font-size:11px;font-weight:bold;color:var(--navy);text-transform:uppercase;letter-spacing:.04em;}
.rm-btn{background:none;border:1px solid #ddd;border-radius:4px;color:#bbb;cursor:pointer;font-size:15px;padding:1px 7px;line-height:1;}
.rm-btn:hover{border-color:#c0392b;color:#c0392b;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.row1{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:8px;}
label.lbl{display:block;font-size:11px;font-weight:bold;color:var(--subtle);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
input[type=text],input[type=date],input[type=time],select{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:Arial,sans-serif;color:var(--text);background:#fff;outline:none;}
input:focus,select:focus{border-color:var(--accent);}
.combo{display:flex;gap:6px;}
.combo select{flex:1;}
.combo input[type=text]{flex:1;display:none;}
.edit-btn{background:var(--light);border:1px solid var(--accent);border-radius:4px;color:var(--navy);cursor:pointer;font-size:11px;font-weight:bold;padding:0 9px;white-space:nowrap;}
.edit-btn:hover{background:var(--accent);color:#fff;}
.hint{font-size:10px;color:var(--subtle);margin-top:2px;}

.pre-wrap{display:flex;align-items:center;gap:10px;padding:13px 15px;background:#fff;border:1px solid var(--border);border-radius:6px;cursor:pointer;margin-bottom:14px;}
.pre-wrap:hover{border-color:var(--accent);}
.pre-wrap input[type=checkbox]{width:17px;height:17px;accent-color:var(--navy);cursor:pointer;}
.pre-text{font-size:13px;}
.pre-badge{margin-left:auto;background:#e8f7ee;border:1px solid #4caf50;border-radius:12px;color:#2e7d32;font-size:11px;font-weight:bold;padding:2px 10px;}
.pvbox{background:#fafafa;border:1px solid var(--border);border-radius:5px;padding:14px 16px;min-height:70px;font-size:13px;line-height:1.8;}
.pv-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #f0f0f0;}
.pv-row:last-child{border-bottom:none;}
.pv-loc{color:var(--navy);font-weight:bold;}
.pv-dur{color:var(--subtle);}
.pv-hr{border:none;border-top:1px solid var(--border);margin:6px 0;}
.pv-total{display:flex;justify-content:space-between;font-weight:bold;color:var(--navy);font-size:14px;margin-top:3px;}
.pv-ded{color:#c0392b;font-size:12px;display:flex;justify-content:space-between;}
.pv-add{color:#2e7d32;font-size:12px;display:flex;justify-content:space-between;}
.pv-empty{color:#ccc;font-style:italic;text-align:center;padding:10px 0;}
.pv-warn{background:#fff3cd;border:1px solid #ffc107;border-radius:4px;color:#856404;font-size:11px;margin-top:6px;padding:5px 9px;}
.actions{display:flex;gap:10px;margin-top:18px;}
.btn-email{flex:1;background:var(--navy);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:14px;font-weight:bold;padding:12px;}
.btn-email:hover{background:#232c7a;}
.btn-docx{flex:1;background:#fff;border:2px solid var(--navy);border-radius:6px;color:var(--navy);cursor:pointer;font-size:14px;font-weight:bold;padding:12px;}
.btn-docx:hover{background:var(--navy);color:#fff;}
@media(max-width:540px){.row2{grid-template-columns:1fr;}.actions{flex-direction:column;}.hdr img{height:36px;}}
</style>
</head>

var entryCount = 0;

function buildOptions() {
  var s = '<option value="">Select project...</option>';
  for (var i = 0; i < PROJECTS.length; i++) {
    s += '<option value="' + PROJECTS[i].id + '">' + PROJECTS[i].name + '</option>';
  }
  s += '<option value="__manual__">Other (type below)...</option>';
  return s;
}

function addEntry() {
  entryCount++;
  var idx = entryCount;
  var existingCount = document.querySelectorAll('.entry').length;
  var isStripe = existingCount % 2 !== 0;
  var defStart = (existingCount === 0) ? '07:00' : '';
  var defEnd   = (existingCount === 0) ? '15:00' : '';

  var div = document.createElement('div');
  div.className = 'entry' + (isStripe ? ' stripe' : '');
  div.id = 'entry-' + idx;

  var html = '';
  html += '<div class="entry-hdr">';
  html += '  <span class="entry-num">Entry ' + idx + '</span>';
  html += '  <button class="rm-btn" data-idx="' + idx + '">&times;</button>';
  html += '</div>';
  html += '<div class="row1"><div>';
  html += '  <label class="lbl">Project / Activity</label>';
  html += '  <div class="combo" id="combo-' + idx + '">';
  html += '    <select id="sel-' + idx + '">' + buildOptions() + '</select>';
  html += '    <input type="text" id="man-' + idx + '" placeholder="Type activity...">';
  html += '    <button class="edit-btn" data-toggle="' + idx + '">Edit</button>';
  html += '  </div>';
  html += '</div></div>';
  html += '<div class="row2">';
  html += '  <div>';
  html += '    <label class="lbl">Start Time</label>';
  html += '    <input type="time" id="start-' + idx + '" value="' + defStart + '" min="07:00" max="23:59">';
  html += '    <div class="hint">Earliest: 07:00</div>';
  html += '  </div>';
  html += '  <div>';
  html += '    <label class="lbl">End Time</label>';
  html += '    <input type="time" id="end-' + idx + '" value="' + defEnd + '" min="07:00" max="23:59">';
  html += '    <div class="hint">Latest: 23:59</div>';
  html += '  </div>';
  html += '</div>';

  div.innerHTML = html;
  document.getElementById('entries').appendChild(div);

  // Wire up events after insertion
  var sel = document.getElementById('sel-' + idx);
  var man = document.getElementById('man-' + idx);
  var startIn = document.getElementById('start-' + idx);
  var endIn   = document.getElementById('end-' + idx);

  sel.addEventListener('change', function() {
    if (sel.value === '__manual__') {
      sel.style.display = 'none';
      man.style.display = 'block';
      man.focus();
    }
    updatePreview();
  });
  man.addEventListener('input', updatePreview);
  function setMaxAttrs() {
    var mx = getMaxTime();
    startIn.setAttribute('max', mx);
    endIn.setAttribute('max', mx);
  }
  setMaxAttrs();
  startIn.addEventListener('change', function() { clampTime(startIn); updatePreview(); });
  endIn.addEventListener('change',   function() { clampTime(endIn);   updatePreview(); });

  div.querySelector('.rm-btn').addEventListener('click', function() {
    removeEntry(idx);
  });
  div.querySelector('.edit-btn').addEventListener('click', function() {
    toggleManual(idx);
  });

  restripe();
  updatePreview();
}

function removeEntry(idx) {
  var el = document.getElementById('entry-' + idx);
  if (el) el.parentNode.removeChild(el);
  restripe();
  updatePreview();
}

function toggleManual(idx) {
  var sel = document.getElementById('sel-' + idx);
  var man = document.getElementById('man-' + idx);
  if (!sel || !man) return;
  if (sel.style.display === 'none') {
    sel.style.display = '';
    man.style.display = 'none';
    sel.value = '';
  } else {
    sel.style.display = 'none';
    man.style.display = 'block';
    man.focus();
  }
  updatePreview();
}

function restripe() {
  var blocks = document.querySelectorAll('.entry');
  for (var i = 0; i < blocks.length; i++) {
    if (i % 2 === 0) { blocks[i].classList.remove('stripe'); }
    else             { blocks[i].classList.add('stripe'); }
  }
}

function getMaxTime() {
  var dateVal = document.getElementById('gdate').value;
  var today = new Date().toISOString().split('T')[0];
  if (dateVal === today) {
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, '0');
    var mm = String(now.getMinutes()).padStart(2, '0');
    return hh + ':' + mm;
  }
  return '23:59';
}

function clampTime(input) {
  if (!input.value) return;
  var parts = input.value.split(':');
  var h = parseInt(parts[0], 10);
  if (h < 7) { input.value = '07:00'; return; }
  var maxTime = getMaxTime();
  if (input.value > maxTime) input.value = maxTime;
}

function applyMaxToAll() {
  var maxTime = getMaxTime();
  var blocks = document.querySelectorAll('.entry');
  for (var i = 0; i < blocks.length; i++) {
    var id = blocks[i].id.replace('entry-', '');
    var startIn = document.getElementById('start-' + id);
    var endIn   = document.getElementById('end-' + id);
    if (startIn && startIn.value > maxTime) startIn.value = maxTime;
    if (endIn   && endIn.value   > maxTime) endIn.value   = maxTime;
  }
  updatePreview();
}

function timeToMins(t) {
  if (!t) return null;
  var parts = t.split(':');
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
}

function minsToLabel(m) {
  if (m === null || m < 0) return '0 min';
  var h = Math.floor(m / 60);
  var min = m % 60;
  if (h === 0) return min + ' min';
  if (min === 0) return h + ' hr' + (h !== 1 ? 's' : '');
  return h + ' hr' + (h !== 1 ? 's' : '') + ' ' + min + ' min';
}

function fmtTime(t) {
  if (!t) return '';
  var parts = t.split(':');
  var h = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);
  var ampm = h < 12 ? 'am' : 'pm';
  var h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
  return h12 + (m > 0 ? ':' + (m < 10 ? '0' + m : m) : '') + ampm;
}

function getLabel(idx) {
  var sel = document.getElementById('sel-' + idx);
  var man = document.getElementById('man-' + idx);
  if (!sel || !man) return '';
  if (sel.style.display === 'none') return man.value.trim();
  if (sel.value && sel.value !== '__manual__') return sel.options[sel.selectedIndex].text;
  return '';
}

function getEntries() {
  var result = [];
  var blocks = document.querySelectorAll('.entry');
  for (var i = 0; i < blocks.length; i++) {
    var id = blocks[i].id.replace('entry-', '');
    var label = getLabel(id);
    var startEl = document.getElementById('start-' + id);
    var endEl   = document.getElementById('end-' + id);
    var start   = startEl ? startEl.value : '';
    var end     = endEl   ? endEl.value   : '';
    var startM  = timeToMins(start);
    var endM    = timeToMins(end);
    var dur     = (startM !== null && endM !== null) ? endM - startM : null;
    result.push({ label: label, start: start, end: end, startM: startM, endM: endM, dur: dur });
  }
  return result;
}

function updatePreview() {
  var box = document.getElementById('preview');
  var entries = getEntries();
  var prestart = document.getElementById('prestart').checked;

  var meaningful = entries.filter(function(e) { return e.label || e.start || e.end; });
  if (meaningful.length === 0) {
    box.innerHTML = '<div class="pv-empty">Add a project to see your timesheet.</div>';
    return;
  }

  var totalMins = 0;
  var hasOverlap = false;
  var intervals = [];
  var html = '';

  for (var i = 0; i < meaningful.length; i++) {
    var e = meaningful[i];
    var invalid = (e.dur !== null && e.dur <= 0);
    var timeStr = '';
    if (e.start && e.end) timeStr = fmtTime(e.start) + ' to ' + fmtTime(e.end);
    else if (e.start) timeStr = fmtTime(e.start);

    if (e.startM !== null && e.endM !== null) {
      for (var j = 0; j < intervals.length; j++) {
        if (e.startM < intervals[j].end && e.endM > intervals[j].start) hasOverlap = true;
      }
      intervals.push({ start: e.startM, end: e.endM });
    }
    if (e.dur !== null && e.dur > 0) totalMins += e.dur;

    var durTxt = invalid ? '<span style="color:#e74c3c">check times</span>' : (e.dur !== null ? minsToLabel(e.dur) : '');
    html += '<div class="pv-row">';
    html += '<span><span class="pv-loc">' + (e.label || '(no project)') + '</span>';
    if (timeStr) html += ' &mdash; ' + timeStr;
    html += '</span><span class="pv-dur">' + durTxt + '</span></div>';
  }

  html += '<hr class="pv-hr">';
  var prestartMins = prestart ? 15 : 0;
  var net = totalMins - 30 + prestartMins;
  if (net < 0) net = 0;

  if (prestart) html += '<div class="pv-add"><span>+ Prestart meeting</span><span>+15 min</span></div>';

  html += '<div class="pv-total"><span>Total Payable Hours</span><span>' + minsToLabel(net) + '</span></div>';
  if (hasOverlap) html += '<div class="pv-warn">Warning: some time periods overlap.</div>';

  box.innerHTML = html;
}

function buildBodyText() {
  var dateVal = document.getElementById('gdate').value;
  var dateStr = '';
  if (dateVal) {
    var d = new Date(dateVal + 'T12:00:00');
    dateStr = d.toLocaleDateString('en-AU', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }
  var entries = getEntries().filter(function(e){ return e.label || e.start || e.end; });
  var prestart = document.getElementById('prestart').checked;
  var body = 'SIMMONS CIVIL CONTRACTING\nDAILY DIARY\n';
  if (dateStr) body += 'Date: ' + dateStr + '\n';
  body += '\n';
  var totalMins = 0;
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var timeStr = (e.start && e.end) ? (fmtTime(e.start) + ' to ' + fmtTime(e.end)) : '';
    var durStr  = (e.dur !== null && e.dur > 0) ? minsToLabel(e.dur) : '';
    if (e.dur !== null && e.dur > 0) totalMins += e.dur;
    body += (e.label || '(no project)');
    if (timeStr) body += ' - ' + timeStr;
    if (durStr)  body += ' = ' + durStr;
    body += '\n';
  }
  body += '\n';
  if (prestart) body += '+ Prestart meeting: +15 min\n';
  body += '- Smoko / lunch (compulsory): -30 min\n';
  var net = totalMins - 30 + (prestart ? 15 : 0);
  if (net < 0) net = 0;
  body += '\nTotal Payable Hours: ' + minsToLabel(net);
  return body;
}

function sendEmail() {
  var body = buildBodyText();
  var dateVal = document.getElementById('gdate').value;
  var dateStr = dateVal ? new Date(dateVal + 'T12:00:00').toLocaleDateString('en-AU') : '';
  var subject = 'Timesheet' + (dateStr ? ' - ' + dateStr : '');

  // Open a small overlay with copy-ready content and mailto link
  var overlay = document.createElement('div');
  overlay.id = 'email-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';

  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:8px;padding:24px;max-width:520px;width:100%;font-family:Arial,sans-serif;';

  var titleEl = document.createElement('div');
  titleEl.style.cssText = 'font-size:15px;font-weight:bold;color:#2D3691;margin-bottom:4px;';
  titleEl.textContent = 'Send Timesheet';

  var toEl = document.createElement('div');
  toEl.style.cssText = 'font-size:12px;color:#595959;margin-bottom:12px;';
  toEl.textContent = 'To: timesheets@simmonscivil.com.au';

  var subEl = document.createElement('div');
  subEl.style.cssText = 'font-size:12px;color:#595959;margin-bottom:8px;';
  subEl.textContent = 'Subject: ' + subject;

  var ta = document.createElement('textarea');
  ta.value = body;
  ta.readOnly = true;
  ta.style.cssText = 'width:100%;height:200px;border:1px solid #ccc;border-radius:4px;padding:10px;font-size:12px;font-family:Arial,sans-serif;color:#444;background:#fafafa;resize:none;margin-bottom:12px;';

  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;';

  var openBtn = document.createElement('a');
  openBtn.href = 'mailto:timesheets@simmonscivil.com.au?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  openBtn.style.cssText = 'flex:1;background:#2D3691;color:#fff;border:none;border-radius:6px;padding:11px;text-align:center;font-size:13px;font-weight:bold;text-decoration:none;display:block;';
  openBtn.textContent = 'Open in Mail App';

  var closeBtn = document.createElement('button');
  closeBtn.textContent = 'Close';
  closeBtn.style.cssText = 'flex:1;background:#fff;color:#2D3691;border:2px solid #2D3691;border-radius:6px;padding:11px;font-size:13px;font-weight:bold;cursor:pointer;';
  closeBtn.addEventListener('click', function() { document.body.removeChild(overlay); });

  btnRow.appendChild(openBtn);
  btnRow.appendChild(closeBtn);
  box.appendChild(titleEl);
  box.appendChild(toEl);
  box.appendChild(subEl);
  box.appendChild(ta);
  box.appendChild(btnRow);
  overlay.appendChild(box);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}

function saveDocx() {
  if (typeof docx === 'undefined') {
    alert('Word library still loading. Please try again in a moment.');
    return;
  }
  var D = docx;
  var CONTENT_WIDTH = 9638;
  var dateVal = document.getElementById('gdate').value;
  var dateStr = dateVal
    ? new Date(dateVal + 'T12:00:00').toLocaleDateString('en-AU', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
    : 'Date not set';
  var entries = getEntries().filter(function(e){ return e.label || e.start || e.end; });
  var prestart = document.getElementById('prestart').checked;
  var logoBytes = Uint8Array.from(atob(LOGO_B64), function(c){ return c.charCodeAt(0); });

  var cb = { style: D.BorderStyle.SINGLE, size: 1, color: 'CCCCCC' };
  var borders = { top: cb, bottom: cb, left: cb, right: cb };
  var cm = { top: 80, bottom: 80, left: 120, right: 120 };

  function hCell(text, w) {
    return new D.TableCell({ borders: borders, width: { size: w, type: D.WidthType.DXA },
      shading: { fill: 'D6EEF9', type: D.ShadingType.CLEAR }, margins: cm, verticalAlign: D.VerticalAlign.CENTER,
      children: [new D.Paragraph({ children: [new D.TextRun({ text: text, bold: true, color: '2D3691', size: 18, font: 'Arial' })] })] });
  }
  function dCell(text, w, shade) {
    return new D.TableCell({ borders: borders, width: { size: w, type: D.WidthType.DXA },
      shading: { fill: shade, type: D.ShadingType.CLEAR }, margins: cm, verticalAlign: D.VerticalAlign.CENTER,
      children: [new D.Paragraph({ children: [new D.TextRun({ text: String(text || ''), size: 18, font: 'Arial', color: '444444' })] })] });
  }

  var totalMins = 0;
  var dataRows = [];
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var shade = i % 2 === 0 ? 'FFFFFF' : 'F2F2F2';
    var timeStr = (e.start && e.end) ? (fmtTime(e.start) + ' to ' + fmtTime(e.end)) : (e.start || '');
    var durStr  = (e.dur !== null && e.dur > 0) ? minsToLabel(e.dur) : '';
    if (e.dur !== null && e.dur > 0) totalMins += e.dur;
    dataRows.push(new D.TableRow({ children: [dCell(e.label || '', 5500, shade), dCell(timeStr, 2600, shade), dCell(durStr, 1538, shade)] }));
  }
  if (dataRows.length === 0) {
    dataRows.push(new D.TableRow({ children: [dCell('No entries', 5500, 'FFFFFF'), dCell('', 2600, 'FFFFFF'), dCell('', 1538, 'FFFFFF')] }));
  }

  var prestartMins = prestart ? 15 : 0;
  var net = totalMins - 30 + prestartMins;
  if (net < 0) net = 0;

  var summaryParas = [];
  if (prestart) summaryParas.push(new D.Paragraph({ spacing: { before: 0, after: 60 },
    children: [new D.TextRun({ text: '+ Prestart meeting attended: +15 min', size: 18, font: 'Arial', color: '2e7d32' })] }));
  summaryParas.push(new D.Paragraph({ spacing: { before: 60, after: 0 },
    children: [new D.TextRun({ text: 'Total Payable Hours: ' + minsToLabel(net), bold: true, size: 22, font: 'Arial', color: '2D3691' })] }));

  var doc = new D.Document({
    sections: [{
      properties: { page: { size: { width: 11906, height: 16838 }, margin: { top: 1134, right: 1134, bottom: 1134, left: 1134 } } },
      headers: { default: new D.Header({ children: [new D.Paragraph({
        border: { bottom: { style: D.BorderStyle.SINGLE, size: 18, color: '29ACE4', space: 1 } },
        spacing: { after: 60 },
        tabStops: [{ type: D.TabStopType.RIGHT, position: CONTENT_WIDTH }],
        children: [
          new D.ImageRun({ type: 'png', data: logoBytes, transformation: { width: 100, height: 38 }, altText: { title: 'SCC Logo', description: 'SCC', name: 'SCCLogo' } }),
          new D.TextRun('\t'),
          new D.TextRun({ text: 'CONFIDENTIAL', bold: true, color: '2D3691', size: 16, font: 'Arial' })
        ]
      })] }) },
      footers: { default: new D.Footer({ children: [new D.Paragraph({
        border: { top: { style: D.BorderStyle.SINGLE, size: 6, color: 'CCCCCC', space: 1 } },
        spacing: { before: 60 },
        tabStops: [{ type: D.TabStopType.RIGHT, position: CONTENT_WIDTH }],
        children: [
          new D.TextRun({ text: 'Timesheet', color: '595959', size: 16, font: 'Arial' }),
          new D.TextRun('\t'),
          new D.TextRun({ text: 'Page ', color: '595959', size: 16, font: 'Arial' }),
          new D.TextRun({ children: [D.PageNumber.CURRENT], color: '595959', size: 16, font: 'Arial' })
        ]
      })] }) },
      children: [
        new D.Paragraph({ spacing: { before: 0, after: 60 },
          children: [new D.TextRun({ text: 'TIMESHEET', bold: true, size: 28, color: '2D3691', font: 'Arial' })] }),
        new D.Paragraph({ spacing: { before: 0, after: 60 },
          children: [new D.TextRun({ text: dateStr, size: 18, color: '595959', font: 'Arial' })] }),
        new D.Paragraph({ spacing: { before: 0, after: 200 },
          border: { bottom: { style: D.BorderStyle.SINGLE, size: 6, color: 'CCCCCC', space: 1 } },
          children: [new D.TextRun('')] }),
        new D.Table({ width: { size: CONTENT_WIDTH, type: D.WidthType.DXA }, columnWidths: [5500, 2600, 1538],
          rows: [ new D.TableRow({ children: [hCell('Project / Activity', 5500), hCell('Time', 2600), hCell('Duration', 1538)] }) ].concat(dataRows) }),
        new D.Paragraph({ spacing: { before: 240, after: 60 },
          border: { bottom: { style: D.BorderStyle.SINGLE, size: 6, color: 'CCCCCC', space: 1 } },
          children: [new D.TextRun('')] })
      ].concat(summaryParas)
    }]
  });

  D.Packer.toBlob(doc).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var fileDateStr = dateVal ? dateVal.replace(/-/g, '') : 'undated';
    a.download = 'SCC_Daily_Diary_' + fileDateStr + '.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
}

// Wire up static buttons
document.getElementById('btn-email').addEventListener('click', sendEmail);
document.getElementById('btn-docx').addEventListener('click', saveDocx);
document.getElementById('prestart').addEventListener('change', updatePreview);
document.getElementById('gdate').addEventListener('change', function() { applyMaxToAll(); updatePreview(); });
document.getElementById('gdate').value = new Date().toISOString().split('T')[0];

// Start with one entry
addEntry();

})();
